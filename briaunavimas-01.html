<!DOCTYPE html>
<html lang="lt" class="transition-colors duration-200">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalių Briaunavimas</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            colors: {
                brandBg: '#d9e8e8',
                brandBlue: '#264A68',
                brandHover: '#203b53',
                brandRed: '#ef3b46'
            }
        }
    }
}
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body { font-family: system-ui, sans-serif; }
</style>
</head>

<body class="bg-brandBg text-slate-800">
<div id="root"></div>

<script>
const {useState,useEffect,useMemo,useRef,useCallback,memo} = React;

/* =====================
   HELPERS
===================== */

const CACHE_VERSION = 5;
const CACHE_KEY = `cached_parts_csv_v${CACHE_VERSION}`;

const extractFeatures = (str) => {
    const tokens = str.toUpperCase().split(/\s+/);
    return {
        hasA: tokens.includes('A') || tokens.includes('AF') || tokens.includes('FA'),
        hasF: tokens.includes('F') || tokens.includes('AF') || tokens.includes('FA'),
        dim: str.replace(/\b(A|F|AF|FA)\b/ig,'').trim()
    };
};

/* =====================
   INDEXED DB
===================== */

const idb = {
    dbPromise: new Promise((resolve,reject)=>{
        const req=indexedDB.open('EdgeBandingCache',1);
        req.onupgradeneeded=e=>e.target.result.createObjectStore('csvStore');
        req.onsuccess=e=>resolve(e.target.result);
        req.onerror=e=>reject(e.target.error);
    }),
    async get(key){
        const db=await this.dbPromise;
        return new Promise((res,rej)=>{
            const r=db.transaction('csvStore').objectStore('csvStore').get(key);
            r.onsuccess=()=>res(r.result);
            r.onerror=()=>rej(r.error);
        });
    },
    async set(key,val){
        const db=await this.dbPromise;
        return new Promise((res,rej)=>{
            const r=db.transaction('csvStore','readwrite').objectStore('csvStore').put(val,key);
            r.onsuccess=res;
            r.onerror=rej;
        });
    }
};

/* =====================
   HOOKS
===================== */

function useDebounce(value,delay){
    const [v,setV]=useState(value);
    useEffect(()=>{
        const t=setTimeout(()=>setV(value),delay);
        return ()=>clearTimeout(t);
    },[value]);
    return v;
}

/* =====================
   MAIN APP
===================== */

function App(){

const [lang,setLang]=useState('lt');
const [search,setSearch]=useState('');
const debounced=useDebounce(search,300);

const [parts,setParts]=useState([]);
const [loading,setLoading]=useState(true);
const [error,setError]=useState(null);
const [selected,setSelected]=useState(null);

const observerRef=useRef(null);
const loaderRef=useRef(null);
const lastFocus=useRef(null);

/* =====================
   LOCAL STORAGE
===================== */

useEffect(()=>{
    const l=localStorage.getItem('lang');
    const s=localStorage.getItem('search');
    if(l) setLang(l);
    if(s) setSearch(s);
},[]);

useEffect(()=>localStorage.setItem('lang',lang),[lang]);
useEffect(()=>localStorage.setItem('search',search),[search]);

/* =====================
   FETCH CSV
===================== */

const parseCSV = useCallback((text)=>{
    Papa.parse(text,{
        skipEmptyLines:true,
        complete:(res)=>{
            try{
                if(!res.data?.length) throw Error();

                const list=[];

                res.data.forEach((c,i)=>{
                    if(c.length<10) return;

                    const cutL=Number(c[5]);
                    if(!Number.isFinite(cutL)) return;

                    list.push({
                        id:i+"",
                        name:c[2]||'Detalė',
                        code:c[1]||'-',
                        cutL:Number(c[5])||0,
                        cutW:Number(c[6])||0,
                        cutT:Number(c[7])||18,
                        finalL:Number(c[8])||0,
                        finalW:Number(c[9])||0,
                        finalT:Number(c[10])||18
                    });
                });

                if(list.length===0) throw Error();
                setParts(list);
                setError(null);

            }catch{
                setError("CSV klaida");
            }
        }
    });
},[]);

useEffect(()=>{
    const controller=new AbortController();

    (async()=>{
        try{
            const local=await idb.get(CACHE_KEY);

            if(local){
                parseCSV(local);
                setLoading(false);
            }

            const r=await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQSHJJdOhsNzRuq-WmcCS1SFCUqvRlYFYU9I9rs1LL9zlJ8AQWzwB3l_1PY67wbnHxhTDTi5VrC1jRq/pub?gid=1947074840&single=true&output=csv",{signal:controller.signal});
            const txt=await r.text();

            if(txt.trim()!== (local||'').trim()){
                await idb.set(CACHE_KEY,txt);
                parseCSV(txt);
            }

        }catch(e){
            setError("Fetch klaida");
        }finally{
            setLoading(false);
        }
    })();

    return ()=>controller.abort();
},[]);

/* =====================
   FILTER
===================== */

const filtered = useMemo(()=>{
    const s=debounced.toLowerCase();
    if(!s) return parts;

    return parts.filter(p=>{
        return `${p.name} ${p.code}`.toLowerCase().includes(s);
    });
},[parts,debounced]);

/* =====================
   RENDER LIMIT
===================== */

const [limit,setLimit]=useState(50);

useEffect(()=>setLimit(50),[debounced]);

const visible = useMemo(()=>filtered.slice(0,limit),[filtered,limit]);

useEffect(()=>{
    if(observerRef.current) observerRef.current.disconnect();

    observerRef.current=new IntersectionObserver(entries=>{
        if(entries[0].isIntersecting){
            setLimit(p=>p+50);
        }
    });

    if(loaderRef.current) observerRef.current.observe(loaderRef.current);

    return ()=>observerRef.current.disconnect();
},[visible.length,filtered.length]);

/* =====================
   MODAL FOCUS
===================== */

useEffect(()=>{
    if(selected){
        lastFocus.current=document.activeElement;
        document.body.style.overflow='hidden';
    }else{
        document.body.style.overflow='auto';
        lastFocus.current?.focus();
    }
},[selected]);

/* =====================
   UI
===================== */

return React.createElement("div",{className:"max-w-4xl mx-auto p-4"},

React.createElement("input",{
value:search,
onChange:e=>setSearch(e.target.value),
placeholder:"Search",
className:"w-full mb-4 p-2 border"
}),

loading ? "Loading..." :

error ? React.createElement("div",null,
error,
React.createElement("button",{onClick:()=>location.reload()},"Retry")
) :

React.createElement("div",null,

visible.map(p=>
React.createElement("div",{
key:p.id,
role:"button",
tabIndex:0,
onClick:()=>setSelected(p),
onKeyDown:e=>{
if(e.key==="Enter"||e.key===" ") setSelected(p);
},
className:"p-3 border mb-2 cursor-pointer"
},
p.name+" ("+p.code+")"
)
),

visible.length<filtered.length &&
React.createElement("div",{ref:loaderRef},"Loading more...")
),

selected &&
React.createElement("div",{className:"fixed inset-0 bg-black/50 flex items-center justify-center"},
React.createElement("div",{className:"bg-white p-6"},
React.createElement("h2",null,selected.name),
React.createElement("p",null,selected.cutL+"x"+selected.cutW),
React.createElement("button",{onClick:()=>setSelected(null)},"Close")
))
);
}

/* =====================
   RENDER
===================== */

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
