<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalių Briaunavimas</title>

<style>
/* =====================
   NHS-STYLE BASE
===================== */

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f0f4f5;
    color: #212b32;
}

.container {
    max-width: 720px;
    margin: 0 auto;
    padding: 16px;
}

/* Header */
.header {
    background: #005eb8;
    color: white;
    padding: 16px;
    font-size: 20px;
    font-weight: bold;
}

/* Input */
input {
    width: 100%;
    padding: 10px;
    border: 2px solid #4c6272;
    font-size: 16px;
    margin-bottom: 16px;
}

/* Button */
button {
    background: #005eb8;
    color: white;
    border: none;
    padding: 10px 14px;
    cursor: pointer;
}

button:hover {
    background: #003f8c;
}

/* Card list */
.card {
    background: white;
    padding: 12px;
    border: 1px solid #d8dde0;
    margin-bottom: 10px;
    cursor: pointer;
}

.card:focus {
    outline: 3px solid #ffdd00;
}

/* Modal */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 20px;
    max-width: 400px;
    width: 90%;
}

/* Status */
.status {
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="header">Detalių Briaunavimas</div>

<div class="container">

<input id="search" placeholder="Ieškoti..." />

<div id="status" class="status"></div>

<div id="list"></div>

<button id="loadMore" hidden>Load more</button>

</div>

<!-- Modal -->
<div id="modal" hidden class="modal" role="dialog" aria-modal="true">
    <div class="modal-box">
        <h2 id="modalTitle"></h2>
        <p id="modalBody"></p>
        <button id="closeModal">Uždaryti</button>
    </div>
</div>

<script>
/* =====================
   STATE
===================== */

let parts = [];
let filtered = [];
let visibleCount = 50;

/* =====================
   ELEMENTS
===================== */

const searchEl = document.getElementById('search');
const listEl = document.getElementById('list');
const statusEl = document.getElementById('status');
const loadMoreBtn = document.getElementById('loadMore');

const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const modalBody = document.getElementById('modalBody');
const closeModal = document.getElementById('closeModal');

/* =====================
   CSV PARSE
===================== */

function parseCSV(text) {
    const rows = text.split('\n');

    const result = [];

    rows.forEach((row, i) => {
        const c = row.split(',');

        if (c.length < 10) return;

        const cutL = Number(c[5]);
        if (!Number.isFinite(cutL)) return;

        result.push({
            id: i,
            name: c[2] || 'Detalė',
            code: c[1] || '-',
            cutL: Number(c[5]) || 0,
            cutW: Number(c[6]) || 0
        });
    });

    return result;
}

/* =====================
   RENDER
===================== */

function render() {
    listEl.innerHTML = '';

    const visible = filtered.slice(0, visibleCount);

    visible.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card';
        div.tabIndex = 0;

        div.textContent = `${p.name} (${p.code})`;

        div.onclick = () => openModal(p);
        div.onkeydown = e => {
            if (e.key === 'Enter') openModal(p);
        };

        listEl.appendChild(div);
    });

    loadMoreBtn.hidden = visible.length >= filtered.length;

    statusEl.textContent = `${filtered.length} rezultatų`;
}

/* =====================
   FILTER
===================== */

function applyFilter() {
    const s = searchEl.value.toLowerCase();

    filtered = parts.filter(p =>
        (p.name + ' ' + p.code).toLowerCase().includes(s)
    );

    visibleCount = 50;
    render();
}

/* =====================
   MODAL
===================== */

function openModal(p) {
    modalTitle.textContent = p.name;
    modalBody.textContent = `${p.cutL} x ${p.cutW}`;
    modal.hidden = false;
    document.body.style.overflow = 'hidden';
}

function closeModalFn() {
    modal.hidden = true;
    document.body.style.overflow = 'auto';
}

/* =====================
   EVENTS
===================== */

searchEl.addEventListener('input', applyFilter);

loadMoreBtn.onclick = () => {
    visibleCount += 50;
    render();
};

closeModal.onclick = closeModalFn;
modal.onclick = e => {
    if (e.target === modal) closeModalFn();
};

/* =====================
   FETCH (WITH CACHE)
===================== */

async function loadData() {
    const CACHE_KEY = 'csv_cache_v1';

    try {
        const cached = localStorage.getItem(CACHE_KEY);

        if (cached) {
            parts = parseCSV(cached);
            filtered = parts;
            render();
        }

        const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQSHJJdOhsNzRuq-WmcCS1SFCUqvRlYFYU9I9rs1LL9zlJ8AQWzwB3l_1PY67wbnHxhTDTi5VrC1jRq/pub?gid=1947074840&single=true&output=csv");
        const text = await res.text();

        if (text !== cached) {
            localStorage.setItem(CACHE_KEY, text);
            parts = parseCSV(text);
            filtered = parts;
            render();
        }

    } catch {
        statusEl.textContent = 'Klaida kraunant duomenis';
    }
}

/* =====================
   INIT
===================== */

loadData();

</script>

</body>
</html>
