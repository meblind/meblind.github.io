            dbPromise: new Promise((resolve, reject) => {
                const req = indexedDB.open('EdgeBandingCache', 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore('csvStore');
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e.target.error);
            }),
            async get(key) {
                const db = await this.dbPromise;
                return new Promise((res, rej) => {
                    const req = db.transaction('csvStore', 'readonly').objectStore('csvStore').get(key);
                    req.onsuccess = () => res(req.result);
                    req.onerror = () => rej(req.error);
                });
            },
            async set(key, val) {
                const db = await this.dbPromise;
                return new Promise((res, rej) => {
                    const req = db.transaction('csvStore', 'readwrite').objectStore('csvStore').put(val, key);
                    req.onsuccess = () => res();
                    req.onerror = () => rej(req.error);
                });
            }
        };

        function useDebounce(value, delay) {
            const [debouncedValue, setDebouncedValue] = useState(value);
            useEffect(() => {
                const handler = setTimeout(() => setDebouncedValue(value), delay);
                return () => clearTimeout(handler);
            }, [value, delay]);
            return debouncedValue;
        }

        function useFocusTrap(ref, isActive) {
            useEffect(() => {
                if (!isActive || !ref.current) return;
                const focusableElements = ref.current.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                if (!focusableElements.length) return;
                const firstElement = focusableElements[0];
                const lastElement = focusableElements[focusableElements.length - 1];
                const handleTab = (e) => {
                    if (e.key !== 'Tab') return;
                    if (e.shiftKey && document.activeElement === firstElement) {
                        lastElement.focus(); e.preventDefault();
                    } else if (!e.shiftKey && document.activeElement === lastElement) {
                        firstElement.focus(); e.preventDefault();
                    }
                };
                window.addEventListener('keydown', handleTab);
                setTimeout(() => firstElement?.focus(), 50);
                return () => window.removeEventListener('keydown', handleTab);
            }, [isActive, ref]);
        }

        };

        const defaultParts = [

        // ─── Shared Components ────────────────────────────
        const HighlightedText = memo(({ text, regex }) => {

        const SkeletonGrid = memo(() => (
            <div className="bg-white p-2 rounded-md border border-slate-200 shadow-sm overflow-hidden animate-pulse">

        // ─── Part 2D View (memoized for performance) ─────
        const Part2DView = memo(({ length, width, steps, visibleCount, clipId, partName }) => {
            let boardXDim = length;
            let boardYDim = width;
            let isRotated = false;
            
            if (steps.length > 0) {
                const firstStepVal = steps[0].val;
                const valNormalized = firstStepVal.replace(',', '.');
                const matchL = new RegExp('(^|\\D)' + length + '(\\D|$)').test(valNormalized);
                const matchW = new RegExp('(^|\\D)' + width + '(\\D|$)').test(valNormalized);
                if (matchW && !matchL) {
                    boardXDim = width; boardYDim = length; isRotated = true;
                }
            }
            const maxDim = Math.max(boardXDim, boardYDim) || 1;
            const scale = 110 / maxDim; 
            const scaledX = boardXDim * scale;
            const scaledY = boardYDim * scale;
            const x = (120 - scaledX) / 2;
            const y = (120 - scaledY) / 2;
            
            const mappedEdges = { top: null, bottom: null, left: null, right: null };
            const matchXPattern = new RegExp('(^|\\D)' + boardXDim + '(\\D|$)');
            const matchYPattern = new RegExp('(^|\\D)' + boardYDim + '(\\D|$)');
            
            steps.forEach((step, idx) => {
                const valNormalized = step.val.replace(',', '.');
                const thicknessPart = valNormalized.split('-')[0].trim();
                const isThin = thicknessPart.includes('0.4');
                const strokeWidth = isThin ? 2.5 : 6; 
                const fill = isThin ? "#E5C19E" : "#D4A373";
                const isRounded = step.val.toUpperCase().includes('A');
                const isFluted = step.val.toUpperCase().includes('F');
                let side = null;
                const matchX = matchXPattern.test(valNormalized);
                const matchY = matchYPattern.test(valNormalized);
                
                if (idx === 0) { side = 'bottom'; } 
                else if (matchX && !matchY) { if (!mappedEdges.bottom) side = 'bottom'; else if (!mappedEdges.top) side = 'top'; } 
                else if (matchY && !matchX) { if (!mappedEdges.left) side = 'left'; else if (!mappedEdges.right) side = 'right'; } 
                else {
                    if (!mappedEdges.bottom) side = 'bottom'; else if (!mappedEdges.top) side = 'top';
                    else if (!mappedEdges.left) side = 'left'; else if (!mappedEdges.right) side = 'right';
                }
                if (side) mappedEdges[side] = { ...step, idx, fill, strokeWidth, isRounded, isFluted, side };
            });
            const edgesArray = Object.values(mappedEdges).filter(Boolean).sort((a, b) => a.idx - b.idx);
            
            const isActive = (side) => mappedEdges[side] && mappedEdges[side].idx < visibleCount;
            const isRounded = (side) => isActive(side) && mappedEdges[side].isRounded;
            
            const isThick = (side) => {
                if (!isActive(side)) return false;
                const thicknessPart = mappedEdges[side].val.replace(',', '.').split('-')[0].trim();
                return !thicknessPart.includes('0.4');
            };
            
            const R = 8, eps = 0.01; 
            let rtl = eps, rtr = eps, rbl = eps, rbr = eps;
            let wantRtl = isRounded('top') || isRounded('left');
            let wantRtr = isRounded('top') || isRounded('right');
            let wantRbl = isRounded('bottom') || isRounded('left');
            let wantRbr = isRounded('bottom') || isRounded('right');
            
            const nameHasLR = /(left|right|\blr\b)/i.test(partName || '');
            if (nameHasLR) {

                wantRtr = wantRtr && isThick('top') && isThick('right');
                wantRbl = wantRbl && isThick('bottom') && isThick('left');
                wantRbr = wantRbr && isThick('bottom') && isThick('right');
            }
            if (wantRtl) rtl = R; if (wantRtr) rtr = R; if (wantRbl) rbl = R; if (wantRbr) rbr = R;
            
            const boardPathD = `M ${x + rtl} ${y} L ${x + scaledX - rtr} ${y} A ${rtr} ${rtr} 0 0 1 ${x + scaledX} ${y + rtr} L ${x + scaledX} ${y + scaledY - rbr} A ${rbr} ${rbr} 0 0 1 ${x + scaledX - rbr} ${y + scaledY} L ${x + rbl} ${y + scaledY} A ${rbl} ${rbl} 0 0 1 ${x} ${y + scaledY - rbl} L ${x} ${y + rtl} A ${rtl} ${rtl} 0 0 1 ${x + rtl} ${y} Z`;
            
            return (
                <div className="w-full h-64 bg-slate-50 rounded-md border border-slate-200 overflow-hidden relative flex justify-center items-center transition-colors">
                    <span className="absolute top-2 left-2 text-[0.625rem] text-slate-400 font-semibold uppercase tracking-wider z-10">Top View</span>
                    <svg viewBox="0 0 120 120" className="w-full h-full max-w-[280px] max-h-[280px] p-2">
                        <defs>
                            <pattern id={`wood-grain-${clipId}`} width="100" height="20" patternUnits="userSpaceOnUse" patternTransform={isRotated ? "rotate(90)" : ""}>
                                <path d="M0,2 Q25,0 50,2 T100,2 M0,6 Q25,8 50,6 T100,6 M0,10 Q25,9 50,10 T100,10" fill="none" stroke="currentColor" strokeWidth="0.4" opacity="0.4" />
                            </pattern>
                            <clipPath id={`board-clip-${clipId}`}><path d={boardPathD} style={{ transition: 'd 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)' }} /></clipPath>
                        </defs>
                        <g clipPath={`url(#board-clip-${clipId})`}>
                            <rect x={x} y={y} width={scaledX} height={scaledY} fill="rgb(var(--slate-200))" />
                            <rect x={x} y={y} width={scaledX} height={scaledY} fill={`url(#wood-grain-${clipId})`} className="text-slate-400 pointer-events-none" />
                            {edgesArray.map(edge => {
                                const isVis = edge.idx < visibleCount;
                                const bw = edge.strokeWidth;
                                let bx = x, by = y, bwr = scaledX, bhr = scaledY;
                                if (edge.side === 'top') { bhr = bw; }
                                if (edge.side === 'bottom') { by = y + scaledY - bw; bhr = bw; }
                                if (edge.side === 'left') { bwr = bw; }
                                if (edge.side === 'right') { bx = x + scaledX - bw; bwr = bw; }
                                
                                const renderFlutes = () => {
                                    if (!edge.isFluted || !isVis) return null;
                                    const len = edge.side === 'top' || edge.side === 'bottom' ? bwr : bhr;
                                    const actualInset = Math.min(8, len * 0.15);
                                    const spacing = bw * 0.25;
                                    const center = bw / 2;
                                    
                                    return [-1, 0, 1].map(i => {
                                        const offset = center + (i * spacing);
                                        let lx1, ly1, lx2, ly2;
                                        if (edge.side === 'top' || edge.side === 'bottom') {
                                            lx1 = bx + actualInset; lx2 = bx + bwr - actualInset; ly1 = ly2 = by + offset;
                                        } else {
                                            lx1 = lx2 = bx + offset; ly1 = by + actualInset; ly2 = by + bhr - actualInset;
                                        }
                                        return <line key={i} x1={lx1} y1={ly1} x2={lx2} y2={ly2} stroke="#451a03" strokeWidth="0.6" opacity="0.75" />;
                                    });
                                };
                                return (
                                    <g key={edge.idx} style={{ opacity: isVis ? 1 : 0, transition: 'opacity 0.2s ease-in-out' }}>
                                        <rect x={bx} y={by} width={bwr} height={bhr} fill={edge.fill} />
                                        {renderFlutes()}
                                    </g>
                                );
                            })}
                        </g>
                        <path d={boardPathD} fill="none" stroke="rgb(var(--slate-300))" strokeWidth="1.2" style={{ transition: 'd 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)' }} className="pointer-events-none" />
                        <text x="60" y="60" textAnchor="middle" dominantBaseline="middle" fill="rgb(var(--slate-500))" fontSize="8" fontWeight="bold" opacity="0.6">{length}x{width}</text>
                    </svg>
                    <div className="absolute top-1 right-2 text-[0.625rem] text-slate-400 font-mono">{isRotated ? `W = ${width}` : `L = ${length}`}</div>
                    <div className="absolute bottom-1 left-2 text-[0.625rem] text-slate-400 font-mono" style={{writingMode: 'vertical-rl'}}>{isRotated ? `L = ${length}` : `W = ${width}`}</div>
                </div>
            );
        });

        // ─── Part Detail Card with manual step control ──
        const PartCard = ({ part, t, onClose }) => {
            const steps = [
                { seq: 1, val: part.edges.step1 }, { seq: 2, val: part.edges.step2 },
                { seq: 3, val: part.edges.step3 }, { seq: 4, val: part.edges.step4 }
            ].filter(s => s.val);
            const [visibleCount, setVisibleCount] = useState(0);
            const modalRef = useRef(null);
            
            useFocusTrap(modalRef, true);
            
            const handlePrev = useCallback(() => setVisibleCount(c => Math.max(0, c - 1)), []);
            const handleNext = useCallback(() => setVisibleCount(c => Math.min(steps.length, c + 1)), [steps.length]);
            const handleReset = useCallback(() => setVisibleCount(0), []);
            
            useEffect(() => {

                    if (e.key === 'ArrowLeft') handlePrev();
                    else if (e.key === 'ArrowRight') handleNext();

                window.addEventListener('keydown', handleKey);

            }, [handlePrev, handleNext]);

            return (
                <div ref={modalRef} className="bg-white rounded-xl border border-slate-200 shadow-2xl overflow-hidden flex flex-col w-full animate-fade-in">
                    <div className="px-6 py-4 border-b border-slate-100 bg-slate-50/80 flex justify-between items-start gap-3">
                        <div className="overflow-hidden">
                            <h3 className="font-bold text-brandBlue text-xl truncate" title={part.name}>{part.name}</h3>
                            <p className="text-xs text-slate-500 font-medium mt-1 truncate">{part.code}</p>
                        </div>
                        <div className="flex items-center gap-2 mt-0.5">
                            <span className="bg-white text-slate-700 border border-slate-200/80 text-xs font-bold px-3 py-1.5 rounded-lg whitespace-nowrap shadow-sm">{part.qty} {t.pcs}</span>
                            <button onClick={onClose} className="md:hidden text-slate-400 hover:text-brandRed p-1 transition-colors" aria-label={t.close}>
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div className="p-6 flex-grow flex flex-col gap-5">
                        <div className="flex gap-4">
                            <div className="flex-1 bg-white p-3 rounded-lg border border-slate-200 text-center shadow-sm">
                                <span className="block text-[0.625rem] text-slate-500 font-bold uppercase tracking-wider mb-2">{t.cutDims}</span>
                                <div className="flex items-center justify-center text-[0.9375rem]">
                                    <span className="text-slate-800 font-bold">{part.cutL}</span><span className="mx-1.5 text-slate-300 text-xs">×</span>
                                    <span className="text-slate-800 font-bold">{part.cutW}</span><span className="mx-1.5 text-slate-300 text-xs">×</span>
                                    <span className="text-slate-500 font-semibold">{part.cutT}</span>
                                </div>
                            </div>
                            <div className="flex-1 bg-blue-50/40 p-3 rounded-lg border border-blue-100/60 text-center shadow-sm">
                                <span className="block text-[0.625rem] text-brandBlue/80 font-bold uppercase tracking-wider mb-2">{t.finalDims}</span>
                                <div className="flex items-center justify-center text-[0.9375rem]">
                                    <span className="text-brandBlue font-bold">{part.finalL}</span><span className="mx-1.5 text-blue-200/80 text-xs">×</span>
                                    <span className="text-brandBlue font-bold">{part.finalW}</span><span className="mx-1.5 text-blue-200/80 text-xs">×</span>
                                    <span className="text-brandBlue/70 font-semibold">{part.finalT}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="w-full">
                            <Part2DView length={part.cutL} width={part.cutW} steps={steps} visibleCount={visibleCount} clipId={part.id} partName={part.name} />
                        </div>
                        
                        <div className="flex items-center justify-center gap-3">
                            <button onClick={handlePrev} disabled={visibleCount === 0} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg text-sm font-semibold text-slate-700 transition-colors flex items-center gap-1">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>
                                {t.prevStep}
                            </button>
                            <span className="text-sm font-bold text-slate-500 min-w-[4rem] text-center">{visibleCount}/{steps.length}</span>
                            <button onClick={handleNext} disabled={visibleCount >= steps.length} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 disabled:opacity-40 disabled:cursor-not-allowed rounded-lg text-sm font-semibold text-slate-700 transition-colors flex items-center gap-1">
                                {t.nextStep}
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"/></svg>
                            </button>
                            <button onClick={handleReset} className="px-3 py-2 text-xs text-slate-500 hover:text-brandRed transition-colors">↺</button>
                        </div>
                        
                        <div className="flex-grow flex flex-col">
                            <span className="block text-[0.625rem] text-slate-500 font-bold uppercase tracking-wider mb-2 px-1">{t.bandingSeq}</span>
                            {steps.length > 0 ? (
                                <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
                                    <div className="grid grid-cols-[1.75rem_2fr_2fr_minmax(3rem,1fr)_minmax(3rem,1fr)] gap-2 md:gap-3 bg-slate-50/80 px-3 md:px-4 py-2.5 border-b border-slate-100 text-[0.5625rem] md:text-[0.625rem] font-bold text-slate-500 uppercase tracking-wider items-center">
                                        <div className="text-center">#</div><div>{t.thickness}</div><div>{t.dimension}</div><div className="text-center truncate">{t.roundedCol}</div><div className="text-center truncate">{t.flutedCol}</div>
                                    </div>
                                    <div className="divide-y divide-slate-100 flex-grow flex flex-col justify-center">
                                        {steps.map((s, idx) => {
                                            const isActive = idx < visibleCount;
                                            const isCurrent = idx === visibleCount - 1;
                                            const bgClass = isCurrent ? "bg-blue-50/60" : (isActive ? "bg-white" : "bg-slate-50/30");
                                            const textClass = isActive ? "text-slate-800" : "text-slate-400";
                                            const numClass = isCurrent ? "bg-brandBlue text-white shadow-md shadow-brandBlue/30 scale-105" : (isActive ? "bg-slate-200 text-slate-700 font-bold" : "bg-white text-slate-400 border border-slate-200");
                                            
                                            const valParts = s.val.split(' - ');
                                            let thickness = '-', dimension = '-';
                                            let isRounded = false, isFluted = false;
                                            
                                            if (valParts.length > 1) {
                                                thickness = valParts[0].trim();
                                                const detailsStr = valParts.slice(1).join(' - ').toUpperCase();
                                                isRounded = /\bA\b|\bAF\b|\bFA\b/.test(detailsStr);
                                                isFluted = /\bF\b|\bAF\b|\bFA\b/.test(detailsStr);
                                                dimension = detailsStr.replace(/\b(A|F|AF|FA)\b/g, '').trim();
                                            } else {
                                                const sUpper = s.val.toUpperCase();
                                                isRounded = /\bA\b|\bAF\b|\bFA\b/.test(sUpper);
                                                isFluted = /\bF\b|\bAF\b|\bFA\b/.test(sUpper);
                                                dimension = sUpper.replace(/\b(A|F|AF|FA)\b/g, '').trim();
                                            }
                                            
                                            return (
                                                <div key={idx} className={`grid grid-cols-[1.75rem_2fr_2fr_minmax(3rem,1fr)_minmax(3rem,1fr)] gap-2 md:gap-3 px-3 md:px-4 py-3 items-center transition-all duration-200 ${bgClass} ${textClass}`}>
                                                    <div className={`flex items-center justify-center w-7 h-7 rounded-full text-xs transition-all duration-200 ${numClass}`}>{s.seq}</div>
                                                    <div className={`text-sm ${isActive ? 'font-bold' : 'font-medium'}`}>{thickness}</div>
                                                    <div className={`text-[0.9375rem] flex items-center ${isActive ? 'font-bold text-brandBlue' : 'font-medium'}`}>
                                                        {dimension}
                                                        {isCurrent && (
                                                            <span className="flex h-2 w-2 relative ml-2 shrink-0">
                                                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brandBlue opacity-75"></span>
                                                                <span className="relative inline-flex rounded-full h-2 w-2 bg-brandBlue"></span>
                                                            </span>
                                                        )}
                                                    </div>
                                                    <div className="flex justify-center">{isRounded ? <svg className={`w-5 h-5 transition-colors ${isCurrent ? 'text-brandBlue' : (isActive ? 'text-emerald-500' : 'text-slate-300')}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> : <span className="text-slate-300/50 font-bold">-</span>}</div>
                                                    <div className="flex justify-center">{isFluted ? <svg className={`w-5 h-5 transition-colors ${isCurrent ? 'text-brandBlue' : (isActive ? 'text-emerald-500' : 'text-slate-300')}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg> : <span className="text-slate-300/50 font-bold">-</span>}</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-slate-50/50 border border-slate-200/80 rounded-lg flex-grow flex items-center justify-center min-h-[100px]"><span className="text-sm font-semibold text-slate-400">-</span></div>
                            )}
                        </div>
                        
                        {part.note && (
                            <div className="mt-1 bg-red-50 p-3 rounded-md border border-red-100">
                                <div className="flex items-center gap-1.5 mb-1">
                                    <svg className="w-3.5 h-3.5 text-brandRed" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span className="block text-[0.625rem] text-brandRed font-semibold uppercase tracking-wider">{t.notes}</span>
                                </div>
                                <p className="text-sm text-slate-800 font-medium whitespace-pre-wrap">{part.note}</p>
                            </div>
                        )}
                        
                        <div className="mt-2 text-center">
                            <button onClick={onClose} className="w-full py-2 bg-brandBlue hover:bg-brandHover hover:scale-[1.02] shadow-sm text-white rounded-md transition-all font-semibold text-sm">{t.close}</button>
                        </div>
                    </div>
                </div>
            );
        };

        // ─── Grid Row (memoized) ──────────────────────────
        const GridRow = memo(({ part, onClick, t, searchRegex }) => (
            <div onClick={() => onClick(part)} tabIndex="0" onKeyDown={(e) => e.key === 'Enter' && onClick(part)} 
                className="grid grid-cols-1 md:grid-cols-12 gap-3 md:gap-4 px-4 py-3.5 items-center border-b border-slate-100 last:border-0 hover:bg-slate-50/80 focus:bg-slate-50 focus:ring-2 focus:ring-inset focus:ring-brandBlue/50 outline-none cursor-pointer transition-all duration-200 print:border-b-black print:border-dashed print:py-2 print:gap-1 group">
                
                <div className="md:col-span-4 flex justify-between items-start md:block pl-1">
                    <span className="text-[0.9375rem] md:text-base font-semibold text-slate-800 group-hover:text-brandBlue transition-colors print:text-black">
                        <HighlightedText text={part.name} regex={searchRegex} />
                    </span>
                    <span className="md:hidden bg-white text-slate-600 border border-slate-200 text-[0.625rem] font-bold px-2 py-0.5 rounded-md shadow-sm print:bg-transparent print:border-none print:p-0 print:text-black">
                        <HighlightedText text={part.code} regex={searchRegex} />
                    </span>
                </div>
                
                <div className="flex gap-4 md:contents text-sm mt-1.5 md:mt-0">
                    <div className="md:col-span-3 flex flex-col md:block justify-center">
                        <span className="md:hidden text-slate-400 text-[0.5625rem] font-bold uppercase tracking-wider mb-0.5 print:hidden">{t.cutting}</span>
                        <div className="flex items-center text-[0.8125rem] md:text-sm">
                            <span className="text-slate-700 font-medium"><HighlightedText text={part.cutL} regex={searchRegex} /></span><span className="mx-1.5 text-slate-300 text-xs">×</span>
                            <span className="text-slate-700 font-medium"><HighlightedText text={part.cutW} regex={searchRegex} /></span><span className="mx-1.5 text-slate-300 text-xs">×</span>
                            <span className="text-slate-500"><HighlightedText text={part.cutT} regex={searchRegex} /></span>
                        </div>
                    </div>
                    <div className="md:col-span-3 flex flex-col md:block justify-center">
                        <span className="md:hidden text-brandBlue/70 text-[0.5625rem] font-bold uppercase tracking-wider mb-0.5 print:hidden">{t.final}</span>
                        <div className="flex items-center text-[0.8125rem] md:text-sm bg-blue-50/60 text-brandBlue px-2.5 py-1 rounded-md border border-blue-100/50 w-fit print:border-none print:bg-transparent print:p-0 print:text-black">
                            <span className="font-bold"><HighlightedText text={part.finalL} regex={searchRegex} /></span><span className="mx-1.5 text-blue-200/80 text-xs print:text-black">×</span>
                            <span className="font-bold"><HighlightedText text={part.finalW} regex={searchRegex} /></span><span className="mx-1.5 text-blue-200/80 text-xs print:text-black">×</span>
                            <span className="font-medium opacity-80"><HighlightedText text={part.finalT} regex={searchRegex} /></span>
                        </div>
                    </div>
                </div>
                
                <div className="hidden md:flex md:col-span-2 justify-end pr-1">
                    <span className="bg-white text-slate-600 border border-slate-200 text-xs font-bold px-2.5 py-1 rounded-md shadow-sm group-hover:border-brandBlue/30 group-hover:text-brandBlue transition-colors print:shadow-none print:bg-transparent print:border-none print:p-0 print:text-black">
                        <HighlightedText text={part.code} regex={searchRegex} />
                    </span>
                </div>
            </div>
        ));

        // ─── Custom Hook: CSV Parsing & Remote Fetch ──────
        const usePartsData = (t) => {
            const [parts, setParts] = useState(defaultParts);
            const [error, setError] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const parseCSV = useCallback((text) => {
                const parseDim = (val, def = 0) => {
                    if (!val) return def;
                    const parsed = parseFloat(val.toString().replace(',', '.'));
                    return isNaN(parsed) ? def : parsed;
                };
                const formatEdge = (type, len) => {
                    if (!type || !len) return null;
                    const tStr = type.trim(), lStr = len.trim();
                    return (tStr !== '0' && lStr !== '0' && tStr !== '-') ? `${tStr} - ${lStr}` : null;
                };
                Papa.parse(text, {
                    header: false, skipEmptyLines: true,
                    complete: (results) => {
                        try {
                            if (!results.data?.length) throw new Error(t.errEmpty);
                            const newParts = [];
                            for (let i = 0; i < results.data.length; i++) {
                                const cols = results.data[i];
                                const rawCutL = cols[5];
                                if (!rawCutL) continue;
                                const strictCheckDim = parseFloat(rawCutL.toString().replace(',', '.'));
                                if (cols.length < 10 || isNaN(strictCheckDim)) continue;
                                
                                const cutL = parseDim(rawCutL, 0); const cutW = parseDim(cols[6], 0); const cutT = parseDim(cols[7], 18);
                                const finalL = parseDim(cols[8], 0); const finalW = parseDim(cols[9], 0); const finalT = parseDim(cols[10], 18);
                                const code = cols[1] || '-'; const name = cols[2] || `Detalė ${i}`; const material = cols[3] || 'Nenurodyta';
                                
                                const _searchStr = `${code} ${name} ${material} ${cutL} ${cutW} ${cutT} ${cutL}x${cutW} ${cutW}x${cutL} ${cutL}x${cutW}x${cutT} ${finalL} ${finalW} ${finalT} ${finalL}x${finalW} ${finalW}x${finalL} ${finalL}x${finalW}x${finalT}`.toLowerCase();
                                newParts.push({
                                    id: `item-${i}-${Date.now()}`, code, name, material,
                                    qty: parseInt(cols[4]) || 1, cutL, cutW, cutT, finalL, finalW, finalT,
                                    edges: {
                                        step1: formatEdge(cols[11], cols[12]), step2: formatEdge(cols[13], cols[14]),
                                        step3: formatEdge(cols[15], cols[16]), step4: formatEdge(cols[17], cols[18])
                                    },
                                    note: cols[19] ? cols[19].trim() : '', _searchStr
                                });
                            }
                            if (newParts.length > 0) { setParts(newParts); setError(null); } 
                            else { setError(t.errParse); }
                        } catch (err) { setError(t.errRead); console.error(err); }
                    },
                    error: (err) => { setError(t.errParse); console.error("PapaParse Error:", err); }
                });
            }, [t]);

            useEffect(() => {
                let isMounted = true;
                const fetchOnlineCSV = async () => {
                    try {
                        const localData = await idb.get('cached_parts_csv_v4');
                        if (localData && isMounted) { parseCSV(localData); setIsLoading(false); } 
                        else if (isMounted) setIsLoading(true);
                        
                        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQSHJJdOhsNzRuq-WmcCS1SFCUqvRlYFYU9I9rs1LL9zlJ8AQWzwB3l_1PY67wbnHxhTDTi5VrC1jRq/pub?gid=1947074840&single=true&output=csv";
                        const response = await fetch(url);
                        if (!response.ok) throw new Error(response.statusText);
                        const remoteText = await response.text();
                        if (remoteText !== localData) {
                            await idb.set('cached_parts_csv_v4', remoteText);
                            if (isMounted) parseCSV(remoteText);
                        }
                    } catch (err) { if (isMounted && isLoading) setError(t.errFetch); } 
                    finally { if (isMounted) setIsLoading(false); }
                };
                fetchOnlineCSV();
                return () => { isMounted = false; };
            }, [parseCSV, t]);

            const uploadCSV = useCallback((file) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    parseCSV(text);
                    idb.set('cached_parts_csv_v4', text); // update cache
                };
                reader.readAsText(file);
            }, [parseCSV]);

            return { parts, error, isLoading, uploadCSV };
        };

        // ─── Main Application ─────────────────────────────
        const App = () => {
            const [lang, setLang] = useState(() => localStorage.getItem('app_lang') || 'lt');
            const t = translations[lang];
            const [searchTerm, setSearchTerm] = useState(() => localStorage.getItem('app_searchTerm') || '');
            const debouncedSearchTerm = useDebounce(searchTerm, 180);
            const { parts, error, isLoading, uploadCSV } = usePartsData(t);
            const [selectedPart, setSelectedPart] = useState(null);
            const selectedPartRef = useRef(null);
            const [selectedCollection, setSelectedCollection] = useState(() => localStorage.getItem('app_selectedCollection') || '');
            const [renderLimit, setRenderLimit] = useState(50);
            const loaderRef = useRef(null);
            const [textScale, setTextScale] = useState(() => {
                const saved = localStorage.getItem('app_textScale'); return saved ? parseInt(saved, 10) : 100;
            });
            const [theme, setTheme] = useState(() => localStorage.getItem('app_theme') || 'light');
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const settingsRef = useRef(null);
            const fileInputRef = useRef(null);
            const [sortKey, setSortKey] = useState('code');
            const [sortDir, setSortDir] = useState('asc');

            // persist preferences
            useEffect(() => { localStorage.setItem('app_lang', lang); }, [lang]);
            useEffect(() => { localStorage.setItem('app_searchTerm', searchTerm); }, [searchTerm]);
            useEffect(() => { localStorage.setItem('app_textScale', textScale.toString()); }, [textScale]);
            useEffect(() => { localStorage.setItem('app_selectedCollection', selectedCollection); }, [selectedCollection]);
            useEffect(() => { document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('app_theme', theme); }, [theme]);
            useEffect(() => {
                let finalScale = textScale;
                if (theme === 'super-compact') finalScale = Math.max(50, textScale * 0.85);
                document.documentElement.style.fontSize = `${finalScale}%`;
            }, [textScale, theme]);

            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (settingsRef.current && !settingsRef.current.contains(event.target)) setIsSettingsOpen(false);
                };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const handleOpenPart = useCallback((part) => {
                window.history.pushState({ step: 'modal' }, '');
                selectedPartRef.current = part; setSelectedPart(part);
            }, []);

            const handleClosePart = useCallback(() => {
                selectedPartRef.current = null; setSelectedPart(null);
                if (window.history.state?.step === 'modal') window.history.back();
            }, []);

            useEffect(() => {
                if (!window.history.state || !window.history.state.initialized) {
                    window.history.replaceState({ step: 'main', initialized: true }, '');
                }
                const handlePopState = (e) => {
                    if (selectedPartRef.current) {
                        if (!e.state || e.state.step !== 'modal') { selectedPartRef.current = null; setSelectedPart(null); }
                    } else {
                        if (e.state?.step === 'modal') window.history.back();
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                if (selectedPart) {
                    document.body.style.overflow = 'hidden';
                    const handleEsc = (e) => { if (e.key === 'Escape') handleClosePart(); };
                    window.addEventListener('keydown', handleEsc);
                    return () => { document.body.style.overflow = 'unset'; window.removeEventListener('keydown', handleEsc); };
                }
            }, [selectedPart, handleClosePart]);

            const searchRegex = useMemo(() => {
                const baseTerms = debouncedSearchTerm.toLowerCase().trim().split(/\s+/).filter(Boolean);
                if (!baseTerms.length) return null;
                const expanded = new Set(baseTerms);
                for(let i = 0; i < baseTerms.length; i++) {
                    if (baseTerms[i].includes('x')) {
                        const p = baseTerms[i].split('x');
                        if (p[0]) expanded.add(p[0]); if (p[1]) expanded.add(p[1]);
                    }
                }
                const sortedTerms = Array.from(expanded).sort((a, b) => b.length - a.length);
                return new RegExp(`(${sortedTerms.map(escapeRegExp).join('|')})`, 'gi');
            }, [debouncedSearchTerm]);

            const collections = useMemo(() => ['AUSTIN', 'MOPAC', 'S1', 'S2', 'S3'], []);
            useEffect(() => {
                if (selectedCollection && !collections.includes(selectedCollection)) setSelectedCollection('');
            }, [collections, selectedCollection]);

            // Sorting logic
            const handleSort = useCallback((key) => {
                setSortKey(prevKey => {
                    if (prevKey === key) {
                        setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                        return key;
                    }
                    setSortDir('asc');
                    return key;
                });
            }, []);

            const sortedFilteredParts = useMemo(() => {
                const searchLower = debouncedSearchTerm.toLowerCase().trim();
                const searchTerms = searchLower.split(/\s+/).filter(Boolean);
                let filtered = parts;
                if (selectedCollection) {
                    filtered = filtered.filter(p => p.code && p.code.toUpperCase().startsWith(selectedCollection.toUpperCase()));
                }
                if (searchTerms.length > 0) {
                    filtered = filtered.filter(p => searchTerms.every(term => p._searchStr.includes(term)));
                }
                // sort
                const getSortValue = (part) => {
                    switch(sortKey) {
                        case 'name': return part.name.toLowerCase();
                        case 'code': return part.code.toLowerCase();
                        case 'cutL': return part.cutL;
                        case 'cutW': return part.cutW;
                        case 'finalL': return part.finalL;
                        case 'finalW': return part.finalW;
                        default: return part.code.toLowerCase();
                    }
                };
                const sorted = [...filtered].sort((a, b) => {
                    const valA = getSortValue(a), valB = getSortValue(b);
                    if (valA < valB) return sortDir === 'asc' ? -1 : 1;
                    if (valA > valB) return sortDir === 'asc' ? 1 : -1;
                    return 0;
                });
                return sorted;
            }, [parts, debouncedSearchTerm, selectedCollection, sortKey, sortDir]);

            useEffect(() => { setRenderLimit(50); }, [debouncedSearchTerm, selectedCollection, sortKey, sortDir]);

            const visibleParts = useMemo(() => sortedFilteredParts.slice(0, renderLimit), [sortedFilteredParts, renderLimit]);

            useEffect(() => {
                if (isLoading || visibleParts.length >= sortedFilteredParts.length) return;
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) setRenderLimit(prev => prev + 50);
                }, { rootMargin: '200px' });
                if (loaderRef.current) observer.observe(loaderRef.current);
                return () => observer.disconnect();
            }, [isLoading, visibleParts.length, sortedFilteredParts.length]);

            const handleShowMore = useCallback(() => setRenderLimit(prev => prev + 50), []);

            // Export CSV
            const exportCSV = useCallback(() => {
                const header = ["Code","Name","Material","Qty","Cut L","Cut W","Cut T","Final L","Final W","Final T","Edge1 Type","Edge1 Dim","Edge2 Type","Edge2 Dim","Edge3 Type","Edge3 Dim","Edge4 Type","Edge4 Dim","Note"];
                const rows = parts.map(p => [
                    p.code, p.name, p.material, p.qty, p.cutL, p.cutW, p.cutT, p.finalL, p.finalW, p.finalT,
                    p.edges.step1 ? p.edges.step1.split(' - ')[0] : '', p.edges.step1 ? p.edges.step1.split(' - ')[1] : '',
                    p.edges.step2 ? p.edges.step2.split(' - ')[0] : '', p.edges.step2 ? p.edges.step2.split(' - ')[1] : '',
                    p.edges.step3 ? p.edges.step3.split(' - ')[0] : '', p.edges.step3 ? p.edges.step3.split(' - ')[1] : '',
                    p.edges.step4 ? p.edges.step4.split(' - ')[0] : '', p.edges.step4 ? p.edges.step4.split(' - ')[1] : '',
                    p.note || ''
                ]);
                const csvContent = [header, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
                const blob = new Blob(['\uFEFF' + csvContent], {type: 'text/csv;charset=utf-8;'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'detales_briaunavimas.csv'; a.click();
                URL.revokeObjectURL(url);
            }, [parts]);

            return (
                <div className="min-h-screen pb-12 transition-colors duration-200">

                                    <g fill="none" stroke="currentColor" className="text-brandRed" strokeWidth="6" strokeLinejoin="round" strokeLinecap="round">
                                        <circle cx="40" cy="45" r="12" />
                                        <path d="M 66.2 55 A 28 28 0 1 0 40 73 L 90 73 L 80 55 Z" />
                                    </g>
                                </svg>
                            </div>
                            <div className="flex-1 max-w-4xl flex flex-col sm:flex-row gap-2 sm:gap-3">
                                <div className="relative flex-1 flex items-center">
                                    <svg className="w-5 h-5 sm:w-6 sm:h-6 text-slate-400 absolute left-3 sm:left-4 z-10 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                    <input type="text" placeholder={t.search} className="w-full pl-10 sm:pl-12 pr-10 sm:pr-12 py-2 sm:py-3 md:py-3.5 text-sm sm:text-base border-2 border-slate-300 rounded-xl bg-slate-50 focus:bg-white focus:ring-4 focus:ring-brandRed/20 focus:border-brandRed outline-none text-slate-800 transition-all shadow-sm placeholder:text-slate-400" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    {searchTerm && (
                                        <button onClick={() => setSearchTerm('')} className="absolute right-2 sm:right-3 p-1.5 text-slate-400 hover:text-brandRed hover:bg-brandRed/10 rounded-full transition-colors focus:outline-none" aria-label={t.clearSearch} title={t.clearSearch}>
                                            <svg className="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                        </button>
                                    )}
                                </div>
                                {collections.length > 0 && (
                                    <div className="relative shrink-0 sm:w-48 md:w-56 flex items-center">
                                        <select value={selectedCollection} onChange={(e) => setSelectedCollection(e.target.value)} className="w-full h-full pl-3 pr-10 py-2 sm:py-3 md:py-3.5 text-sm sm:text-base border-2 border-slate-300 rounded-xl bg-slate-50 focus:bg-white focus:ring-4 focus:ring-brandRed/20 focus:border-brandRed outline-none text-slate-800 transition-all shadow-sm appearance-none cursor-pointer truncate">
                                            <option value="">{t.allCollections}</option>
                                            {collections.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <div className="absolute right-3 pointer-events-none text-slate-400">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="flex items-center gap-2 shrink-0">
                                {/* Upload CSV Button */}
                                <input type="file" accept=".csv" ref={fileInputRef} className="hidden" onChange={(e) => { if (e.target.files[0]) uploadCSV(e.target.files[0]); e.target.value = ''; }} />
                                <button onClick={() => fileInputRef.current.click()} className="p-2 md:p-2.5 rounded-xl transition-all shadow-sm border text-slate-600 hover:text-brandBlue hover:bg-slate-50 border-slate-200" title={t.uploadDesktop}>
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                                </button>
                                {/* Export CSV */}
                                <button onClick={exportCSV} className="p-2 md:p-2.5 rounded-xl transition-all shadow-sm border text-slate-600 hover:text-brandBlue hover:bg-slate-50 border-slate-200" title={t.exportCSV}>
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                                </button>
                                {/* Settings */}
                                <div className="relative" ref={settingsRef}>
                                    <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className={`p-2 md:p-2.5 rounded-xl transition-all shadow-sm border ${isSettingsOpen ? 'bg-slate-100 text-brandBlue border-slate-300' : 'text-slate-600 hover:text-brandBlue hover:bg-slate-50 border-slate-200'}`} aria-label={t.settings} title={t.settings}>
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        </svg>
                                    </button>
                                    {isSettingsOpen && (
                                        <div className="absolute top-full right-0 mt-3 w-64 bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden z-50 animate-fade-in origin-top-right">

                                                        <button onClick={() => setLang('en')} className={`text-2xl transition-all duration-200 hover:scale-110 ${lang === 'en' ? 'scale-110 drop-shadow-sm' : 'opacity-40 grayscale hover:opacity-100 hover:grayscale-0'}`} title="English">🇬🇧</button>
                                                        <button onClick={() => setLang('uk')} className={`text-2xl transition-all duration-200 hover:scale-110 ${lang === 'uk' ? 'scale-110 drop-shadow-sm' : 'opacity-40 grayscale hover:opacity-100 hover:grayscale-0'}`} title="Українська">🇺🇦</button>
                                                    </div>
                                                </div>
                                                <div className="w-full h-px bg-slate-100"></div>
                                                <div>
                                                    <span className="block text-[0.625rem] font-bold text-slate-400 uppercase tracking-wider mb-2.5">{t.textSize}</span>

                                                        <button onClick={() => setTextScale(s => Math.max(70, s - 10))} className="px-3 py-1.5 hover:bg-white rounded-md text-sm font-bold text-slate-700 shadow-sm transition-all">A-</button>
                                                        <button onClick={() => setTextScale(100)} className="px-3 py-1.5 hover:bg-white rounded-md text-sm font-bold text-slate-700 shadow-sm transition-all">A</button>
                                                        <button onClick={() => setTextScale(s => Math.min(150, s + 10))} className="px-3 py-1.5 hover:bg-white rounded-md text-sm font-bold text-slate-700 shadow-sm transition-all">A+</button>
                                                    </div>
                                                </div>
                                                <div className="w-full h-px bg-slate-100"></div>
                                                <div>

                                                        </button>
                                                        <button onClick={() => setTheme('dark')} className={`p-2 rounded-lg transition-colors flex-1 flex justify-center ${theme === 'dark' ? 'bg-brandBlue text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100 bg-slate-50 border border-slate-200'}`}>
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                                                        </button>
                                                        <button onClick={() => setTheme('minimal')} className={`p-2 rounded-lg transition-colors flex-1 flex justify-center ${theme === 'minimal' ? 'bg-brandBlue text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100 bg-slate-50 border border-slate-200'}`}>
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/></svg>
                                                        </button>
                                                        <button onClick={() => setTheme('hn')} className={`p-2 rounded-lg transition-colors flex-1 flex justify-center ${theme === 'hn' ? 'bg-brandBlue text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100 bg-slate-50 border border-slate-200'}`}>
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="2" y="2" width="20" height="20" rx="2" ry="2" strokeWidth="2"/><path d="M8 8l4 6v4m4-10l-4 6"/></svg>
                                                        </button>
                                                        <button onClick={() => setTheme('super-compact')} className={`p-2 rounded-lg transition-colors flex-1 flex justify-center ${theme === 'super-compact' ? 'bg-brandBlue text-white shadow-sm' : 'text-slate-500 hover:bg-slate-100 bg-slate-50 border border-slate-200'}`}>
                                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M4 6h16M4 10h16M4 14h16M4 18h16" strokeLinecap="round"/></svg>
                                                        </button>
                                                    </div>
                                                </div>
                                                <div className="w-full h-px bg-slate-100"></div>
                                                <div>
                                                    <a href="https://docs.google.com/spreadsheets/d/1dmgyXAz_ZEbjI5P5P6MbiwaSTIY6KesygqZ-6gvvvs8/edit?gid=1947074840#gid=1947074840" target="_blank" rel="noopener noreferrer" className="cursor-pointer bg-brandRed hover:bg-red-600 hover:scale-105 text-white py-2.5 px-4 rounded-lg shadow-md transition-all text-sm font-bold flex items-center justify-center gap-2 w-full">
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                                        <span>{t.editData}</span>
                                                    </a>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>
                    <div className="sticky top-0 md:top-0 z-20 bg-brandRed h-1 shadow-sm print:hidden"></div>
                    <main className="max-w-6xl mx-auto px-4 mt-4">
                        {/* Status bar */}
                        {!isLoading && sortedFilteredParts.length > 0 && (
                            <div className="mb-3 text-sm text-slate-600 font-medium flex items-center justify-between flex-wrap gap-2">
                                <span>{t.showing(visibleParts.length, sortedFilteredParts.length)}</span>

                        )}
                        {error && (
                            <div className="mb-6 p-4 bg-white border-l-4 border-brandRed text-slate-800 rounded-md shadow-sm flex items-center gap-3 print:hidden">
                                <svg className="w-5 h-5 flex-shrink-0 text-brandRed" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

                                <button onClick={() => setError(null)} className="ml-auto text-slate-400 hover:text-brandRed">✕</button>

                        )}
                        {isLoading ? (
                            <SkeletonGrid />
                        ) : sortedFilteredParts.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-md border border-slate-200 shadow-sm print:hidden">
                                <div className="mx-auto w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4"><svg className="h-8 w-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>

                        ) : (

                                </div>
                                <div className="flex flex-col print:gap-0">
                                    {visibleParts.map(part => <GridRow key={part.id} part={part} onClick={handleOpenPart} t={t} searchRegex={searchRegex} />)}
                                </div>
                                {visibleParts.length < sortedFilteredParts.length && (
                                    <div className="p-4 flex justify-center print:hidden gap-3">
                                        <button onClick={handleShowMore} className="px-5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-sm rounded-lg transition-colors shadow-sm">
                                            {t.showMore(sortedFilteredParts.length - visibleParts.length)}
                                        </button>
                                        <div ref={loaderRef}></div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                    {selectedPart && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 print:hidden" role="dialog" aria-modal="true">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={handleClosePart}></div>
                            <div className="relative w-full max-w-2xl z-10 flex flex-col">
                                <div className="hidden md:flex justify-end mb-3">
                                    <button onClick={handleClosePart} className="text-white bg-slate-900/40 hover:bg-brandRed hover:scale-110 rounded-full p-2 backdrop-blur-md transition-all shadow-lg" title={t.close} aria-label={t.close}>
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                                <div className="max-h-[85vh] overflow-y-auto rounded-md shadow-2xl">
                                    <PartCard part={selectedPart} t={t} onClose={handleClosePart} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
