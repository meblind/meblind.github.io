<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietary Constraint Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f4f4f5; color: #18181b; font-family: system-ui, sans-serif; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.1); border-left-color: #18181b; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const apiKey = "";

        const fetchWithRetry = async (url, options, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    return await response.json();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        };

        const parseCSV = (csv) => {
            const lines = csv.split('\n');
            const result = [];
            for (let line of lines) {
                if (!line.trim()) continue;
                const row = [];
                let curr = '', inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { row.push(curr.trim()); curr = ''; }
                    else curr += char;
                }
                row.push(curr.trim());
                result.push(row);
            }
            return result;
        };

        function App() {
            const [intolerances, setIntolerances] = React.useState([
                "Cow's Milk", "Egg Yolk", "Egg White", "Goat's Milk Cheese",
                "Mozzarella Cheese", "Buttermilk", "Wheat", "Gluten"
            ]);
            const [recipeType, setRecipeType] = React.useState("Random");
            const [output, setOutput] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [error, setError] = React.useState(null);

            const processFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const data = parseCSV(event.target.result);
                    if (data.length < 2) return setError("Structural anomaly: Invalid CSV schema.");
                    
                    const headers = data[0].map(h => h.toLowerCase());
                    const foodIdx = headers.findIndex(h => h.includes('food product'));
                    const levelIdx = headers.findIndex(h => h.includes('intolerance level'));
                    
                    if (foodIdx === -1 || levelIdx === -1) return setError("Missing required vectors: 'Food Product' or 'Intolerance Level'.");
                    
                    const extracted = data.slice(1)
                        .filter(row => {
                            const level = row[levelIdx]?.replace(/['"]/g, '').trim();
                            return ["Very High", "High", "Moderate"].includes(level);
                        })
                        .map(row => row[foodIdx]?.replace(/['"]/g, '').trim())
                        .filter(Boolean);
                    
                    setIntolerances([...new Set(extracted)]);
                    setError(null);
                };
                reader.readAsText(file);
            };

            const executeGeneration = async () => {
                setLoading(true);
                setError(null);
                setOutput(null);

                try {
                    const prompt = `Synthesize a ${recipeType} recipe. CRITICAL NEGATIVE CONSTRAINT: Absolutely exclude the following and their derivatives: ${intolerances.join(', ')}.`;
                    
                    const textPayload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "You are a clinical dietician and culinary architect. Output strictly valid JSON." }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    title: { type: "STRING" },
                                    description: { type: "STRING" },
                                    ingredients: { type: "ARRAY", items: { type: "STRING" } },
                                    instructions: { type: "ARRAY", items: { type: "STRING" } },
                                    visualPrompt: { type: "STRING" }
                                },
                                required: ["title", "description", "ingredients", "instructions", "visualPrompt"]
                            }
                        }
                    };

                    const textRes = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(textPayload) }
                    );
                    
                    if (!textRes.candidates) throw new Error("Generative text sequence failed.");
                    const recipeData = JSON.parse(textRes.candidates[0].content.parts[0].text);

                    const imagePayload = {
                        instances: { prompt: `Photorealistic food photography, high resolution. ${recipeData.visualPrompt}` },
                        parameters: { sampleCount: 1 }
                    };

                    const imageRes = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`,
                        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(imagePayload) }
                    );

                    recipeData.imageUrl = `data:image/png;base64,${imageRes.predictions[0].bytesBase64Encoded}`;
                    setOutput(recipeData);

                } catch (err) {
                    setError(`Execution fault: ${err.message}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-1 space-y-6">
                        <div className="bg-white p-5 rounded-lg border border-zinc-200 shadow-sm">
                            <h2 className="font-semibold mb-4 text-sm uppercase tracking-wider text-zinc-500">Input Parameters</h2>
                            <label className="block text-sm font-medium mb-1">Load Intolerance Matrix (CSV)</label>
                            <input type="file" accept=".csv" onChange={processFile} className="w-full text-sm mb-4 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-zinc-100 file:text-zinc-700 hover:file:bg-zinc-200" />
                            
                            <h3 className="text-xs font-semibold uppercase text-zinc-400 mb-2 mt-4">Active Restrictors</h3>
                            <div className="flex flex-wrap gap-1.5 max-h-40 overflow-y-auto bg-zinc-50 p-2 rounded border border-zinc-100">
                                {intolerances.map(item => <span key={item} className="px-2 py-0.5 bg-zinc-200 text-zinc-800 text-xs rounded">{item}</span>)}
                            </div>
                        </div>

                        <div className="bg-white p-5 rounded-lg border border-zinc-200 shadow-sm">
                            <h2 className="font-semibold mb-4 text-sm uppercase tracking-wider text-zinc-500">Execution</h2>
                            <label className="block text-sm font-medium mb-1">Classification Target</label>
                            <select value={recipeType} onChange={e => setRecipeType(e.target.value)} className="w-full p-2 mb-4 border border-zinc-300 rounded text-sm focus:outline-none focus:border-zinc-500">
                                {["Random", "Breakfast", "Lunch", "Dinner", "Dessert", "Snack"].map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                            
                            <button onClick={executeGeneration} disabled={loading} className="w-full bg-zinc-900 text-white text-sm font-medium py-2.5 rounded hover:bg-zinc-800 disabled:opacity-50 flex items-center justify-center">
                                {loading ? <div className="spinner border-l-white"></div> : 'Compute Protocol'}
                            </button>
                        </div>
                        {error && <div className="p-3 bg-red-50 text-red-800 text-xs rounded border border-red-200">{error}</div>}
                    </div>

                    <div className="lg:col-span-2">
                        {loading && !output && (
                            <div className="h-full min-h-[400px] flex items-center justify-center bg-white border border-zinc-200 rounded-lg shadow-sm">
                                <div className="flex flex-col items-center"><div className="spinner mb-3 h-6 w-6"></div><span className="text-sm text-zinc-500">Synthesizing valid configuration...</span></div>
                            </div>
                        )}
                        
                        {output && !loading && (
                            <div className="bg-white rounded-lg border border-zinc-200 shadow-sm overflow-hidden">
                                {output.imageUrl && <img src={output.imageUrl} alt="Generated visual" className="w-full h-72 object-cover border-b border-zinc-200" />}
                                <div className="p-6 md:p-8">
                                    <h1 className="text-2xl font-bold mb-2">{output.title}</h1>
                                    <p className="text-zinc-600 mb-6 text-sm">{output.description}</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div>
                                            <h3 className="text-sm font-bold uppercase tracking-wider mb-3 text-zinc-500">Compounds</h3>
                                            <ul className="space-y-1 text-sm">
                                                {output.ingredients.map((ing, i) => <li key={i} className="flex"><span className="mr-2 text-zinc-400">-</span>{ing}</li>)}
                                            </ul>
                                        </div>
                                        <div>
                                            <h3 className="text-sm font-bold uppercase tracking-wider mb-3 text-zinc-500">Procedure</h3>
                                            <ol className="space-y-2 text-sm list-decimal list-inside marker:text-zinc-400">
                                                {output.instructions.map((inst, i) => <li key={i}>{inst}</li>)}
                                            </ol>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!output && !loading && (
                            <div className="h-full min-h-[400px] flex items-center justify-center bg-zinc-50 border border-zinc-200 border-dashed rounded-lg">
                                <span className="text-sm text-zinc-400">System idle. Awaiting initialization parameters.</span>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
