<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Media Caster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        #castbutton { 
            --connected-color: #10b981; 
            --disconnected-color: #ef4444; 
            width: 40px; 
            height: 40px; 
        }
        .loader {
            border: 2px solid #1e293b;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-xl font-bold tracking-tight">Media Relay System</h1>
            <button is="google-cast-button" id="castbutton"></button>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Target Payload URL</label>
                <input type="text" id="mediaUrl" placeholder="YouTube, Twitter, or direct link..." 
                    class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-200">
            </div>

            <button id="broadcastBtn" 
                class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:cursor-not-allowed text-white font-bold py-3 rounded-lg shadow-lg transition-all transform active:scale-95">
                <span id="btnText">Resolve & Execute</span>
            </button>
        </div>

        <div id="status" class="mt-6 p-3 rounded bg-slate-900/50 text-xs font-mono text-slate-400 border border-slate-800 break-all">
            Initializing subsystem...
        </div>
    </div>

    <script>
        const apiKey = ""; // Environment provided
        const statusEl = document.getElementById('status');
        const mediaInput = document.getElementById('mediaUrl');
        const broadcastBtn = document.getElementById('broadcastBtn');
        const btnText = document.getElementById('btnText');

        const log = (msg) => {
            statusEl.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        };

        window.__onGCastApiAvailable = function(isAvailable) {
            if (isAvailable) {
                initializeCastApi();
            } else {
                log("System Error: Cast API hardware discovery failed.");
            }
        };

        function initializeCastApi() {
            if (typeof cast === 'undefined' || !cast.framework) {
                setTimeout(initializeCastApi, 100);
                return;
            }
            const context = cast.framework.CastContext.getInstance();
            context.setOptions({
                receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
            });
            log("System Ready. Connect to node via Cast icon.");
        }

        async function resolveUrl(inputUrl) {
            // Direct links skip the resolution engine
            if (inputUrl.match(/\.(mp4|m4v|mp3|mkv|mov)$|^http.*googlevideo\.com/i)) {
                return inputUrl;
            }

            log("Invoking resolution engine...");
            btnText.innerHTML = '<span class="loader"></span>Resolving...';
            broadcastBtn.disabled = true;

            const systemPrompt = "You are a media URI extractor. Your task is to find the direct, streamable video/audio URL from the provided webpage or video link. If it is a YouTube link, return the URL as is but verify its streamability. Output ONLY the raw URL string.";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Resolve this link to a direct media stream: ${inputUrl}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{ "google_search": {} }]
                    })
                });

                const result = await response.json();
                const resolved = result.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                
                if (!resolved || resolved.includes("error")) throw new Error("Resolution returned empty payload.");
                return resolved;
            } catch (err) {
                console.error("Resolution Error:", err);
                return inputUrl; // Fallback to original
            } finally {
                btnText.innerText = "Resolve & Execute";
                broadcastBtn.disabled = false;
            }
        }

        async function launchMedia() {
            if (typeof cast === 'undefined') {
                log("Error: Cast SDK not loaded.");
                return;
            }

            const context = cast.framework.CastContext.getInstance();
            const session = context.getCurrentSession();
            
            if (!session) {
                log("Error: No active Cast session. Tap the Cast icon.");
                return;
            }

            let url = mediaInput.value.trim();
            if (!url) {
                log("Error: No URL provided.");
                return;
            }

            // Resolve non-direct URLs
            url = await resolveUrl(url);
            log(`Resolved: ${url.substring(0, 50)}...`);

            const mediaInfo = new chrome.cast.media.MediaInfo(url, 'video/mp4');
            mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
            mediaInfo.metadata.title = "Network Relay Stream";
            
            const request = new chrome.cast.media.LoadRequest(mediaInfo);
            
            try {
                log("Transmitting payload...");
                await session.loadMedia(request);
                log("Success: Playback initiated.");
            } catch (err) {
                log(`Transmission failed: ${err}`);
            }
        }

        broadcastBtn.addEventListener('click', launchMedia);
    </script>

    <script type="text/javascript" src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
</body>
</html>
